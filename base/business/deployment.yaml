apiVersion: apps/v1
kind: Deployment
metadata:
  name: business
  namespace: amuse
  labels:
    app.kubernetes.io/name: business
    app.kubernetes.io/part-of: amuse
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: business
  template:
    metadata:
      labels:
        app.kubernetes.io/name: business
        app.kubernetes.io/part-of: amuse
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: business
          image: ghcr.io/honguyenminh/amuse-business:master
          ports:
            - name: http
              containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: NEXT_PUBLIC_API_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: amuse-frontend-env
                  key: NEXT_PUBLIC_API_BASE_URL
          # tcpSocket — AGC health follows readiness; HTTP GET / returns 307 on Next.js (unhealthy upstream).
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
