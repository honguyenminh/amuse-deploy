apiVersion: v1
kind: ConfigMap
metadata:
  name: amuse-common-env
  namespace: amuse
  labels:
    app.kubernetes.io/part-of: amuse
data:
  ASPNETCORE_URLS: "http://+:8080"
  Media__CoversBucket: "amuse-covers"
  Media__AudioBucket: "amuse-audio"
  Media__ForcePathStyle: "true"
  Media__SignedUrlMinutes: "30"
  RabbitMq__HostName: "rabbitmq"
  RabbitMq__Port: "5672"
  RabbitMq__UserName: "amuse"
  RabbitMq__QueueName: "amuse.transcode.jobs"
  RabbitMq__PrefetchCount: "1"
  Jwt__Issuer: "amuse"
  Jwt__Audience: "amuse-api"
  CatalogScheduler__PollIntervalSeconds: "60"
  CatalogScheduler__BatchSize: "50"
