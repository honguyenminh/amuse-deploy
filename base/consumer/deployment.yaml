apiVersion: apps/v1
kind: Deployment
metadata:
  name: consumer
  namespace: amuse
  labels:
    app.kubernetes.io/name: consumer
    app.kubernetes.io/part-of: amuse
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: consumer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: consumer
        app.kubernetes.io/part-of: amuse
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: consumer
          image: ghcr.io/honguyenminh/amuse-consumer:master
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: amuse-frontend-env
                  key: NEXT_PUBLIC_API_BASE_URL
            - name: NEXT_PUBLIC_SITE_URL
              valueFrom:
                configMapKeyRef:
                  name: amuse-frontend-env
                  key: NEXT_PUBLIC_SITE_URL
            - name: API_INTERNAL_BASE_URL
              value: "http://amuse-api"
            - name: MEDIA_PUBLIC_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: amuse-frontend-env
                  key: MEDIA_PUBLIC_BASE_URL
                  optional: true
          # tcpSocket — AGC health follows readiness; HTTP GET / returns 307 on Next.js (unhealthy upstream).
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
