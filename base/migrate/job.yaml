apiVersion: batch/v1
kind: Job
metadata:
  name: amuse-migrate
  namespace: amuse
  labels:
    app.kubernetes.io/name: amuse-migrate
    app.kubernetes.io/part-of: amuse
  annotations:
    # Wave 5: after postgres/minio (wave 0) and secrets (wave -5); before app Deployments (wave 10).
    # Argo CD waits for Job success before applying the next wave.
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/sync-options: Replace=true
spec:
  backoffLimit: 6
  # Do not set ttlSecondsAfterFinished — deleted Jobs make Argo show perpetual Missing/OutOfSync.
  template:
    metadata:
      labels:
        app.kubernetes.io/name: amuse-migrate
    spec:
      restartPolicy: Never
      imagePullSecrets:
        - name: ghcr-pull
      initContainers:
        - name: wait-for-postgres
          image: postgres:18
          command:
            - /bin/sh
            - -c
            - |
              until pg_isready -h postgres -p 5432 -U postgres; do
                echo "waiting for postgres..."
                sleep 2
              done
      containers:
        - name: migrate
          image: ghcr.io/honguyenminh/amuse-migrate:master
          envFrom:
            - secretRef:
                name: amuse-migrate-secrets
