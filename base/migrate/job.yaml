# Argo CD Sync hook: runs once per sync that changes this manifest (e.g. new migrate image tag).
# BeforeHookCreation replaces the previous hook Job; apps (wave 10) wait until this succeeds.
# Do not use Replace=true or HookSucceeded alone — those cause idle auto-sync to re-run migrations.
apiVersion: batch/v1
kind: Job
metadata:
  name: amuse-migrate
  namespace: amuse
  labels:
    app.kubernetes.io/name: amuse-migrate
    app.kubernetes.io/part-of: amuse
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: amuse-migrate
    spec:
      restartPolicy: Never
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: migrate
          image: ghcr.io/honguyenminh/amuse-migrate:master
          envFrom:
            - secretRef:
                name: amuse-migrate-secrets
