apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: amuse
  labels:
    app.kubernetes.io/name: rabbitmq
    app.kubernetes.io/part-of: amuse
spec:
  selector:
    app.kubernetes.io/name: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: amqp
    - name: management
      port: 15672
      targetPort: management
