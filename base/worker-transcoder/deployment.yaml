apiVersion: apps/v1
kind: Deployment
metadata:
  name: amuse-worker-transcoder
  namespace: amuse
  labels:
    app.kubernetes.io/name: amuse-worker-transcoder
    app.kubernetes.io/part-of: amuse
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: amuse-worker-transcoder
  template:
    metadata:
      labels:
        app.kubernetes.io/name: amuse-worker-transcoder
        app.kubernetes.io/part-of: amuse
    spec:
      serviceAccountName: amuse-worker-transcoder
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: worker
          image: ghcr.io/honguyenminh/amuse-worker-transcoder:master
          envFrom:
            - configMapRef:
                name: amuse-common-env
            - configMapRef:
                name: amuse-worker-transcoder-env
            - secretRef:
                name: amuse-worker-transcoder-secrets
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
