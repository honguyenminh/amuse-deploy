apiVersion: batch/v1
kind: Job
metadata:
  name: minio-init
  namespace: amuse
  labels:
    app.kubernetes.io/name: minio-init
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  backoffLimit: 5
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: mc
          image: minio/mc:latest
          env:
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: amuse-minio
                  key: accessKey
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: amuse-minio
                  key: secretKey
          command:
            - /bin/sh
            - -c
            - |
              mc alias set local http://minio:9000 "$MINIO_ACCESS_KEY" "$MINIO_SECRET_KEY"
              mc mb --ignore-existing local/amuse-covers
              mc mb --ignore-existing local/amuse-audio
              mc anonymous set download local/amuse-covers
              echo "minio buckets ready"
