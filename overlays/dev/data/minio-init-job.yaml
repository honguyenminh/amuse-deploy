apiVersion: batch/v1
kind: Job
metadata:
  name: minio-init
  namespace: amuse
  labels:
    app.kubernetes.io/name: minio-init
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: Never
      initContainers:
        - name: wait-for-minio
          image: docker.io/busybox:1.37
          command:
            - /bin/sh
            - -c
            - |
              until wget -q -O /dev/null http://minio:9000/minio/health/ready; do
                echo "waiting for minio..."
                sleep 2
              done
      containers:
        - name: mc
          image: docker.io/minio/mc:latest
          env:
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: amuse-minio
                  key: accessKey
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: amuse-minio
                  key: secretKey
          command:
            - /bin/sh
            - -c
            - |
              mc alias set local http://minio:9000 "$MINIO_ACCESS_KEY" "$MINIO_SECRET_KEY"
              mc mb --ignore-existing local/amuse-covers
              mc mb --ignore-existing local/amuse-audio
              mc anonymous set download local/amuse-covers
              echo "minio buckets ready"
