apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: amuse
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: amuse
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:18
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: amuse-postgres
                  key: password
            - name: POSTGRES_DB
              value: amuse_development
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "amuse_development"]
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
