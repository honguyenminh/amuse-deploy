apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: amuse-api
  namespace: amuse
spec:
  hostnames:
    - api.skynet-beta.m8.io.vn
  rules:
    # MinIO stays cluster-internal; bucket paths are proxied on the API host only.
    - matches:
        - path:
            type: PathPrefix
            value: /amuse-covers
      backendRefs:
        - name: minio
          port: 9000
    - matches:
        - path:
            type: PathPrefix
            value: /amuse-audio
      backendRefs:
        - name: minio
          port: 9000
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: amuse-api
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: amuse-consumer
  namespace: amuse
spec:
  hostnames:
    - app.skynet-beta.m8.io.vn
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: amuse-business
  namespace: amuse
spec:
  hostnames:
    - business.skynet-beta.m8.io.vn
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: amuse-frontend-env
  namespace: amuse
data:
  NEXT_PUBLIC_API_BASE_URL: "https://api.skynet-beta.m8.io.vn"
