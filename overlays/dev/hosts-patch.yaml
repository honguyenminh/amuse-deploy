apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: amuse-api
  namespace: amuse
spec:
  rules:
    # MinIO stays cluster-internal; bucket paths are proxied on the API host only.
    - matches:
        - path:
            type: PathPrefix
            value: /amuse-covers
      backendRefs:
        - name: minio
          port: 9000
    - matches:
        - path:
            type: PathPrefix
            value: /amuse-audio
      backendRefs:
        - name: minio
          port: 9000
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: amuse-api
          port: 80
