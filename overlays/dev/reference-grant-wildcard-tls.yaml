# Apply once outside the amuse Kustomize overlay (namespace transformer would break this):
#   kubectl apply -f infrastructure/kubernetes/overlays/dev/reference-grant-wildcard-tls.yaml
#
# Allows Gateway in namespace amuse to use the wildcard TLS secret in kube-system.
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: amuse-gateway-wildcard-tls
  namespace: kube-system
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: Gateway
      namespace: amuse
  to:
    - group: ""
      kind: Secret
      name: wildcard-tls-secret
