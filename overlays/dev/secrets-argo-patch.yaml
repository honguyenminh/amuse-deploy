# Apply Argo CD sync-wave to all dev secrets so they exist before workloads and hook jobs.
apiVersion: v1
kind: Secret
metadata:
  name: amuse-postgres
  namespace: amuse
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
---
apiVersion: v1
kind: Secret
metadata:
  name: amuse-minio
  namespace: amuse
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
---
apiVersion: v1
kind: Secret
metadata:
  name: amuse-rabbitmq
  namespace: amuse
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
---
apiVersion: v1
kind: Secret
metadata:
  name: amuse-migrate-secrets
  namespace: amuse
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
---
apiVersion: v1
kind: Secret
metadata:
  name: amuse-api-secrets
  namespace: amuse
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
---
apiVersion: v1
kind: Secret
metadata:
  name: amuse-worker-transcoder-secrets
  namespace: amuse
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
---
apiVersion: v1
kind: Secret
metadata:
  name: amuse-worker-scheduler-secrets
  namespace: amuse
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
