# Copy to secrets.yaml (gitignored) or create equivalent secrets with kubectl.
# kubectl create secret generic amuse-postgres -n amuse --from-literal=password=postgres
# kubectl create secret generic amuse-minio -n amuse --from-literal=accessKey=amuse --from-literal=secretKey=amuse_dev_secret
# kubectl create secret generic amuse-rabbitmq -n amuse --from-literal=password=amuse_dev_secret
# kubectl create secret generic amuse-redis -n amuse --from-literal=password=amuse_dev_secret
# kubectl create secret generic amuse-migrate-secrets -n amuse --from-literal=ConnectionStrings__DefaultConnection='Host=postgres;Port=5432;Database=amuse_development;Username=postgres;Password=postgres'
# kubectl create secret generic amuse-api-secrets -n amuse --from-env-file=./api.secrets.env
# kubectl create secret generic amuse-worker-transcoder-secrets -n amuse --from-env-file=./transcoder.secrets.env
# kubectl create secret generic amuse-worker-scheduler-secrets -n amuse --from-literal=ConnectionStrings__DefaultConnection='Host=postgres;Port=5432;Database=amuse_development;Username=postgres;Password=postgres'
# kubectl create secret tls amuse-tls -n amuse --cert=wildcard.crt --key=wildcard.key
# kubectl create secret docker-registry ghcr-pull -n amuse --docker-server=ghcr.io --docker-username=USER --docker-password=TOKEN
---
apiVersion: v1
kind: Secret
metadata:
  name: amuse-postgres
  namespace: amuse
type: Opaque
stringData:
  password: postgres
---
apiVersion: v1
kind: Secret
metadata:
  name: amuse-minio
  namespace: amuse
type: Opaque
stringData:
  accessKey: amuse
  secretKey: amuse_dev_secret
---
apiVersion: v1
kind: Secret
metadata:
  name: amuse-rabbitmq
  namespace: amuse
type: Opaque
stringData:
  password: amuse_dev_secret
---
apiVersion: v1
kind: Secret
metadata:
  name: amuse-redis
  namespace: amuse
type: Opaque
stringData:
  password: amuse_dev_secret
---
apiVersion: v1
kind: Secret
metadata:
  name: amuse-migrate-secrets
  namespace: amuse
type: Opaque
stringData:
  ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=amuse_development;Username=postgres;Password=postgres"
---
apiVersion: v1
kind: Secret
metadata:
  name: amuse-api-secrets
  namespace: amuse
type: Opaque
stringData:
  ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=amuse_development;Username=postgres;Password=postgres"
  Media__Endpoint: "http://minio:9000"
  Media__PublicBaseUrl: "https://api.example.com"
  Media__AccessKey: "amuse"
  Media__SecretKey: "amuse_dev_secret"
  RabbitMq__Password: "amuse_dev_secret"
  Redis__ConnectionString: "redis:6379,password=amuse_dev_secret,abortConnect=false"
  Jwt__SigningKey: "DEV_ONLY_CHANGE_ME_32_CHARS_MINIMUM_KEY"
---
apiVersion: v1
kind: Secret
metadata:
  name: amuse-worker-transcoder-secrets
  namespace: amuse
type: Opaque
stringData:
  ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=amuse_development;Username=postgres;Password=postgres"
  Media__Endpoint: "http://minio:9000"
  Media__PublicBaseUrl: "https://api.example.com"
  Media__AccessKey: "amuse"
  Media__SecretKey: "amuse_dev_secret"
  RabbitMq__Password: "amuse_dev_secret"
---
apiVersion: v1
kind: Secret
metadata:
  name: amuse-worker-scheduler-secrets
  namespace: amuse
type: Opaque
stringData:
  ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=amuse_development;Username=postgres;Password=postgres"
