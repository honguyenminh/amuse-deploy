# Hostname and public URL values are sourced from config/cluster.env via amuse-cluster-config.
- source:
    kind: ConfigMap
    name: amuse-cluster-config
    fieldPath: data.AMUSE_WORKLOAD_IDENTITY_CLIENT_ID
  targets:
    - select:
        kind: ServiceAccount
        name: amuse-api
      fieldPaths:
        - metadata.annotations.[azure.workload.identity/client-id]
      options:
        create: true
    - select:
        kind: ServiceAccount
        name: amuse-worker-transcoder
      fieldPaths:
        - metadata.annotations.[azure.workload.identity/client-id]
      options:
        create: true
    - select:
        kind: ServiceAccount
        name: amuse-worker-scheduler
      fieldPaths:
        - metadata.annotations.[azure.workload.identity/client-id]
      options:
        create: true
- source:
    kind: ConfigMap
    name: amuse-cluster-config
    fieldPath: data.KEY_VAULT_URI
  targets:
    - select:
        kind: ClusterSecretStore
        name: amuse-azure-kv
      fieldPaths:
        - spec.provider.azurekv.vaultUrl
- source:
    kind: ConfigMap
    name: amuse-cluster-config
    fieldPath: data.AGC_ALB_ARM_ID
  targets:
    - select:
        kind: Gateway
        name: amuse-gateway
      fieldPaths:
        - metadata.annotations.[alb.networking.azure.io/alb-id]
      options:
        create: true
- source:
    kind: ConfigMap
    name: amuse-cluster-config
    fieldPath: data.AGC_ALB_FRONTEND
  targets:
    - select:
        kind: Gateway
        name: amuse-gateway
      fieldPaths:
        - spec.addresses.0.value
      options:
        create: true
- source:
    kind: ConfigMap
    name: amuse-cluster-config
    fieldPath: data.GATEWAY_WILDCARD_HOST
  targets:
    - select:
        kind: Gateway
        name: amuse-gateway
      fieldPaths:
        - spec.listeners.0.hostname
- source:
    kind: ConfigMap
    name: amuse-cluster-config
    fieldPath: data.API_HOST
  targets:
    - select:
        kind: HTTPRoute
        name: amuse-api
      fieldPaths:
        - spec.hostnames.0
- source:
    kind: ConfigMap
    name: amuse-cluster-config
    fieldPath: data.APP_HOST
  targets:
    - select:
        kind: HTTPRoute
        name: amuse-consumer
      fieldPaths:
        - spec.hostnames.0
- source:
    kind: ConfigMap
    name: amuse-cluster-config
    fieldPath: data.BUSINESS_HOST
  targets:
    - select:
        kind: HTTPRoute
        name: amuse-business
      fieldPaths:
        - spec.hostnames.0
- source:
    kind: ConfigMap
    name: amuse-cluster-config
    fieldPath: data.PUBLIC_API_BASE_URL
  targets:
    - select:
        kind: ConfigMap
        name: amuse-frontend-env
      fieldPaths:
        - data.NEXT_PUBLIC_API_BASE_URL
- source:
    kind: ConfigMap
    name: amuse-cluster-config
    fieldPath: data.APP_ORIGIN
  targets:
    - select:
        kind: ConfigMap
        name: amuse-frontend-env
      fieldPaths:
        - data.NEXT_PUBLIC_SITE_URL
- source:
    kind: ConfigMap
    name: amuse-cluster-config
    fieldPath: data.APP_ORIGIN
  targets:
    - select:
        kind: ConfigMap
        name: amuse-api-env
      fieldPaths:
        - data.Cors__AllowedOrigins__0
- source:
    kind: ConfigMap
    name: amuse-cluster-config
    fieldPath: data.BUSINESS_ORIGIN
  targets:
    - select:
        kind: ConfigMap
        name: amuse-api-env
      fieldPaths:
        - data.Cors__AllowedOrigins__1
        - data.Tenancy__BusinessPortalBaseUrl
- source:
    kind: ConfigMap
    name: amuse-cluster-config
    fieldPath: data.MEDIA_PUBLIC_BASE_URL
  targets:
    - select:
        kind: ConfigMap
        name: amuse-frontend-env
      fieldPaths:
        - data.MEDIA_PUBLIC_BASE_URL
      options:
        create: true
