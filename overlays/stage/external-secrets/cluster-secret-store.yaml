apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: amuse-azure-kv
spec:
  provider:
    azurekv:
      authType: WorkloadIdentity
      # Tenant ID of the AKS / Key Vault subscription (same as `az account show --query tenantId`).
      tenantId: "41539f7c-b784-4063-9b59-76e45487efe4"
      vaultUrl: "https://REPLACE_KV_NAME.vault.azure.net"
      serviceAccountRef:
        name: amuse-api
        namespace: amuse
