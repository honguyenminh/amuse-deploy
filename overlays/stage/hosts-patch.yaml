# Gateway listener TLS for stage (hostname comes from config/cluster.env replacements).
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: amuse-gateway
  namespace: amuse
spec:
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: "*.amuse.m8.io.vn"
      allowedRoutes:
        namespaces:
          from: Same
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: amuse-tls
            namespace: amuse
    - name: https-apex
      protocol: HTTPS
      port: 443
      hostname: "amuse.m8.io.vn"
      allowedRoutes:
        namespaces:
          from: Same
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: amuse-tls
            namespace: amuse
