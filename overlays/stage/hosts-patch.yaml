apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: amuse-gateway
  namespace: amuse
spec:
  listeners:
    - name: https
      hostname: "*.staging.amuse.local"
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: amuse-api
  namespace: amuse
spec:
  hostnames:
    - api.staging.amuse.local
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: amuse-consumer
  namespace: amuse
spec:
  hostnames:
    - app.staging.amuse.local
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: amuse-business
  namespace: amuse
spec:
  hostnames:
    - business.staging.amuse.local
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: amuse-frontend-env
  namespace: amuse
data:
  NEXT_PUBLIC_API_BASE_URL: "https://api.staging.amuse.local"
